<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report an Item | District Lost & Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="report.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="index.html">District Lost & Found</a>
        <div class="navbar-nav">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link active" href="report.html">Report an Item</a>
            <a class="nav-link" href="registry.html">View Registry</a>
        </div>
    </div>
</nav>

<section class="hero-section text-center">
    <div class="container">
        <h1>Submit a Report</h1>
        <p>Provide details to help the community identify the item.</p>
    </div>
</section>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <form id="reportForm">
                        <div class="mb-3">
                            <label for="status" class="form-label">Report Type</label>
                            <select class="form-select" id="status" required>
                                <option value="" selected disabled>Select status...</option>
                                <option value="lost">I Lost Something</option>
                                <option value="found">I Found Something</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="itemName" class="form-label">Item Name</label>
                            <input type="text" class="form-control" id="itemName" placeholder="e.g. Blue Backpack" required>
                        </div>

                        <div class="mb-3">
                            <label for="location" class="form-label">Location (District/Sector)</label>
                            <input type="text" class="form-control" id="location" placeholder="Where was it seen?" required>
                        </div>

                        <div class="mb-3">
                            <label for="userEmail" class="form-label">Your Email</label>
                            <input type="email" class="form-control" id="userEmail" placeholder="email@example.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" rows="3" placeholder="Any unique marks or details?"></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">Submit to Registry</button>
                    </form>
                    
                    <div id="feedback" class="mt-4"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-light py-4 text-center border-top">
    <div class="container">
        <p class="text-muted mb-0">Local Community Registry Project &copy; 2026</p>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
